<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet"
        href="{{ url_for('static', filename='css/chessboard.css') }}">

        <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

        <script src="{{ url_for('static', filename='js/chessboard.js') }}"></script>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <title>Chessie Analysis Studio</title>
    
    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{

            background:#1d1d1d;
            color:white;

            height:100vh;

            padding:20px;

        }

        h1{

            margin-bottom:20px;
            color:#f0d9b5;

        }

        .main{

            display:grid;

            grid-template-columns:280px 720px 360px;

            justify-content:center;

            gap:20px;

        }

        .header{

            background:#303030;

            color:#f0d9b5;

            font-size:22px;

            font-weight:bold;

            padding:16px;

            border-bottom:1px solid #444;

        }

        .content{

            padding:18px;

        }

        .panel{

            background:#262626;

            border-radius:12px;

            border:1px solid #3a3a3a;

            overflow:hidden;

        }

        .bottom{

            margin-top:20px;

            background:#2b2b2b;

            border-radius:15px;

            padding:20px;

            height:180px;

        }

    </style>

</head>

<body>

<h1>♟ Chessie Analysis Studio</h1>

<div class="main">

    <div class="panel">

        <div class="header">
            Explorer
        </div>

        <div class="content" id="explorer">

        Current Position

        <hr>

        Popular Moves

        <hr>

        Opening Tree

        </div>

        

    </div>

    <div class="panel">


        <div class="header">
            Chess Board
        </div>

        <div class="content">

            <div id="board" style="width:650px"></div>

                <br>

                <div id="fen">
                    Waiting...
                </div>

        </div>



    </div>

    <div class="panel">

        
        <div class="header">
            Position Statistics
        </div>

        <div class="content" id="stats">

        Best Move

        <hr>

        ACPL

        <hr>

        Move Quality

        <hr>

        Engine

        </div>

</div>

    



    <div class="bottom">

        
        <div class="header"> 
            Games Reaching This Position
        </div>


        <div class="content" id="games">

            No position selected.

        </div>

    </div>

    

</div>


<script>

const game = new Chess();
let moveHistory = [];

var board = Chessboard('board', {

    position: 'start',

    draggable: true,

    pieceTheme:
        'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',

    onDrop: function(source, target) {

    

        const move = game.move({

            from: source,
            to: target,
            promotion: 'q'

        });

        if (move === null) {
            return 'snapback';
        }
        
        board.position(game.fen());

        document.getElementById("fen").innerHTML =
            game.fen();
        

    

        console.log("Move:", move.san);
        moveHistory.push(move.san);

        console.log(moveHistory);
        fetch("/position", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            moves: moveHistory
        })
    })
    .then(r => r.json())
    .then(data => {

        let html = "";

        for(const move of data.moves){

            html += `
                <p>
                    <b>${move.move}</b>
                    — ${move.games} games
                </p>
            `;
        }

        document.getElementById("explorer").innerHTML = html;

        document.getElementById("stats").innerHTML = `
            <p><b>Best Move:</b> ${data.best_move}</p>
            <p><b>Eval:</b> ${data.eval}</p>
        `;

        let gamesHtml = "";

        for(const game of data.games_reaching){

            gamesHtml += `<p>${game}</p>`;

        }

        document.getElementById("games").innerHTML =
            gamesHtml;

        

    });

    }

});

document.getElementById("fen").innerHTML =
    game.fen();

</script>

</body>

</html>
